deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 720h
  compactor:
    working_directory: /var/loki/compactor
    retention_enabled: true

singleBinary:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    storageClass: longhorn
    size: 6Gi

# Disable components not used in singleBinary mode
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Disable caches — homelab worker nodes have insufficient memory
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Disable built-in MinIO — using filesystem backend on Longhorn PVC
minio:
  enabled: false

# Disable nginx gateway — direct ClusterIP access via Promtail and Grafana
gateway:
  enabled: false

serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
