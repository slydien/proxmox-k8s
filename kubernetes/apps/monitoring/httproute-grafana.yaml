apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: homelab
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - grafana.home.slydien.com
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
